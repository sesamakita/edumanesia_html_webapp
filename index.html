<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sekolah Admin</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="mesh-bg">
    <div class="login-wrapper">
        <div class="login-card-glass">
            <div class="login-header">
                <div class="login-icon-box" style="background: white; padding: 10px;">
                    <img src="assets/logo.png" alt="Edumanesia Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h1 class="login-title">Edumanesia</h1>
                <p class="text-muted">Education Management System Login</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-floating">
                    <input type="email" id="email" class="form-control" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>

                <div class="form-floating">
                    <input type="password" id="password" class="form-control" placeholder=" " required>
                    <label for="password">Password</label>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                    <label
                        style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--primary-color);"> Ingat saya
                    </label>
                    <a href="#" style="color: var(--primary-color); font-size: 14px; font-weight: 600;">Lupa
                        Password?</a>
                </div>

                <button type="submit" class="btn-primary"
                    style="width: 100%; height: 52px; border-radius: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    Masuk ke Dashboard
                    <span class="material-icons" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <div style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--text-muted);">
                Belum punya akun? <a href="#" style="color: var(--primary-color); font-weight: 600;">Hubungi Admin
                    Pusat</a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
